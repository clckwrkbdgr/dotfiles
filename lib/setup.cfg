[unittest]
data_dir = ${XDG_CACHE_HOME}/pytest/config.${HOSTNAME}
override_report_coveragerc.py3 = ${XDG_CACHE_HOME}/pytest/config.${HOSTNAME}/coveragerc

[coverage:run]
omit = /usr/*
   dotrogue/__main__.py
   clckwrkbdgr/oldendlessrogue/__main__.py
   clckwrkbdgr/oldrogue/__main__.py
data_file = ${XDG_CACHE_HOME}/pytest/config.${HOSTNAME}/coverage

[coverage:report]
skip_covered = True
fail_under = 100

[coverage:html]
directory = .htmlcov
